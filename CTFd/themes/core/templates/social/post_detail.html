{% extends "base.html" %}

{% block stylesheets %}
{{ super() }}
<style>
[x-cloak]{display:none!important}
*,*::before,*::after{box-sizing:border-box}

:root,[data-bs-theme="light"]{
  --app-bg:#f0f2f5;--app-surface:#fff;--app-elevated:#f8f9fa;
  --app-input:#fff;--app-text:#0f1419;--app-text2:#536471;
  --app-muted:#8b98a5;--app-border:rgba(0,0,0,.06);
  --app-accent:#6366f1;--app-accent-rgb:99,102,241;
  --app-accent2:#818cf8;--app-red:#ef4444;--app-red-rgb:239,68,68;
  --app-green:#22c55e;--app-gold:#f59e0b;
  --app-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --app-shadow-lg:0 10px 40px rgba(0,0,0,.08);
  --app-r:16px;--app-r-sm:10px;--app-r-xs:6px;
}
[data-bs-theme="dark"]{
  --app-bg:#000;--app-surface:#16181c;--app-elevated:#1d1f23;
  --app-input:#202327;--app-text:#e7e9ea;--app-text2:#71767b;
  --app-muted:#536471;--app-border:rgba(255,255,255,.06);
  --app-accent:#818cf8;--app-accent-rgb:129,140,248;
  --app-accent2:#a5b4fc;--app-red:#f87171;--app-red-rgb:248,113,113;
  --app-green:#4ade80;--app-gold:#fbbf24;
  --app-shadow:0 1px 3px rgba(0,0,0,.3);
  --app-shadow-lg:0 10px 40px rgba(0,0,0,.4);
}

body{
  background:var(--app-bg)!important;margin:0;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--app-text);
}
.navbar{position:sticky;top:0;z-index:100;}

/* Layout */
.detail-shell{max-width:600px;margin:0 auto;min-height:100vh;padding-bottom:calc(70px + env(safe-area-inset-bottom,0px));}

/* Bottom Nav */
.app-bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:90;
  background:var(--app-surface);
  border-top:1px solid var(--app-border);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
[data-bs-theme="dark"] .app-bottom-nav{background:rgba(22,24,28,.92);}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:.55rem 0 .35rem;gap:.15rem;cursor:pointer;
  color:var(--app-muted);text-decoration:none;transition:color .12s;
  border:none;background:none;font-family:inherit;
}
.bnav-item:hover,.bnav-item.active{color:var(--app-accent);}
.bnav-item i{font-size:1.15rem;}
.bnav-label{font-size:.6rem;font-weight:600;letter-spacing:.5px;}
.bnav-spacer{flex:1;}
.bnav-item--create{
  position:absolute;left:50%;transform:translateX(-50%);
  bottom:calc(6px + env(safe-area-inset-bottom,0px));
  padding:0;z-index:1;
}
.bnav-create{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--app-accent),var(--app-accent2));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:1.3rem;
  box-shadow:0 4px 14px rgba(var(--app-accent-rgb),.35);
}
@media(min-width:640px){
  .app-bottom-nav{display:none;}
  .detail-shell{padding-bottom:0;}
}

/* Back bar */
.detail-header{
  position:sticky;top:56px;z-index:50;
  border-bottom:1px solid var(--app-border);
  padding:.55rem 1rem;display:flex;align-items:center;gap:.6rem;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  background:rgba(255,255,255,.85);
}
[data-bs-theme="dark"] .detail-header{background:rgba(22,24,28,.85);}
.detail-back{
  width:34px;height:34px;border-radius:50%;border:none;
  background:var(--app-elevated);display:flex;align-items:center;justify-content:center;
  color:var(--app-text);cursor:pointer;transition:background .15s;font-size:.85rem;
  text-decoration:none;
}
.detail-back:hover{background:rgba(var(--app-accent-rgb),.1);color:var(--app-accent);}
.detail-header-title{font-size:1rem;font-weight:800;letter-spacing:-.02em;}

/* Avatar */
.avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;overflow:hidden;
  background:linear-gradient(135deg,rgba(var(--app-accent-rgb),.15),rgba(var(--app-accent-rgb),.05));
  display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(var(--app-accent-rgb),.15);
  color:var(--app-accent);font-size:.85rem;
}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-sm{width:34px;height:34px;font-size:.75rem;border-width:1.5px;}
.avatar-xs{width:26px;height:26px;font-size:.6rem;border-width:1px;}

/* Post card */
.post-card{
  background:var(--app-surface);border-bottom:1px solid var(--app-border);
  padding:1.2rem 1rem;animation:fadeUp .3s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.post-head{display:flex;align-items:center;gap:.65rem;margin-bottom:.6rem;}
.post-author-col{flex:1;min-width:0;}
.post-author{
  font-size:.92rem;font-weight:700;color:var(--app-text);
  text-decoration:none;display:block;line-height:1.2;
}
.post-author:hover{color:var(--app-accent);}
.post-meta{font-size:.68rem;color:var(--app-muted);display:flex;align-items:center;gap:.3rem;}
.post-type-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.dot-text{background:var(--app-accent);}
.dot-solve{background:var(--app-green);}
.dot-discussion{background:var(--app-gold);}
.dot-question{background:#a855f7;}

/* Post content */
.post-text{font-size:.92rem;line-height:1.65;word-break:break-word;margin-bottom:.5rem;}
.post-text p{margin:0 0 .4rem;}
.post-text a{color:var(--app-accent);}
.post-text code{background:var(--app-elevated);padding:.1rem .3rem;border-radius:4px;font-size:.8rem;}
.post-text pre{
  background:var(--app-elevated);border:1px solid var(--app-border);
  border-radius:var(--app-r-xs);padding:.6rem;overflow-x:auto;font-size:.75rem;margin:.4rem 0;
}
.post-text pre code{background:none;padding:0;}
.post-text blockquote{border-left:3px solid var(--app-accent);padding-left:.6rem;color:var(--app-text2);margin:.4rem 0;}

/* Media Grid */
.media-grid{
  display:grid;gap:2px;border-radius:var(--app-r);overflow:hidden;margin-top:.5rem;cursor:pointer;
}
.media-grid.mg1{grid-template-columns:1fr;}
.media-grid.mg2{grid-template-columns:1fr 1fr;}
.media-grid.mg3{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr;}
.media-grid.mg3 .mg-item:first-child{grid-row:1/3;}
.media-grid.mg4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.mg-item{position:relative;overflow:hidden;background:var(--app-elevated);min-height:0;}
.mg-item.single{max-height:500px;}
.mg-item:not(.single){aspect-ratio:1;}
.mg-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s;}
.mg-item:hover img{transform:scale(1.02);}
.mg-more{
  position:absolute;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:1.3rem;font-weight:800;
}
.post-single-img{
  border-radius:var(--app-r);overflow:hidden;margin-top:.5rem;max-height:500px;cursor:pointer;
}
.post-single-img img{width:100%;max-height:500px;object-fit:cover;display:block;transition:transform .2s;}
.post-single-img:hover img{transform:scale(1.01);}

/* Challenge pill & tags */
.post-chal-pill{
  display:inline-flex;align-items:center;gap:.3rem;
  padding:.25rem .6rem;border-radius:99px;font-size:.72rem;
  background:rgba(var(--app-accent-rgb),.06);border:1px solid rgba(var(--app-accent-rgb),.12);
  color:var(--app-accent);text-decoration:none;margin-top:.4rem;transition:border-color .12s;
}
.post-chal-pill:hover{border-color:var(--app-accent);color:var(--app-accent);text-decoration:none;}
.post-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:.35rem;}
.post-tag{font-size:.6rem;padding:2px 7px;border-radius:99px;background:rgba(var(--app-accent-rgb),.05);color:var(--app-accent);font-weight:600;}

/* Actions */
.post-actions{display:flex;margin-top:.7rem;gap:0;padding-top:.6rem;border-top:1px solid var(--app-border);}
.pact{
  flex:1;display:flex;align-items:center;justify-content:center;gap:.35rem;
  padding:.55rem;border-radius:var(--app-r-xs);background:none;border:none;
  color:var(--app-muted);font-size:.85rem;cursor:pointer;transition:all .12s;font-family:inherit;
}
.pact:hover{background:var(--app-elevated);color:var(--app-text);}
.pact .count{font-size:.78rem;font-weight:600;}
.pact.liked{color:var(--app-red);}
.pact.liked i{animation:heartPop .35s ease;}
@keyframes heartPop{0%{transform:scale(1)}25%{transform:scale(1.3)}50%{transform:scale(.95)}100%{transform:scale(1)}}

/* Comments section */
.comments-section{background:var(--app-surface);border-bottom:1px solid var(--app-border);padding:.8rem 1rem 1rem;}
.comments-title{
  font-size:.88rem;font-weight:800;display:flex;align-items:center;gap:.4rem;margin-bottom:.8rem;
}
.comments-count{font-weight:400;color:var(--app-muted);font-size:.78rem;}

/* Composer */
.comment-composer{display:flex;gap:.5rem;align-items:flex-start;margin-bottom:1rem;}
.comment-input{
  flex:1;padding:.5rem .7rem;border-radius:20px;
  border:1px solid var(--app-border);background:var(--app-input);
  color:var(--app-text);font-size:.82rem;resize:none;
  font-family:inherit;min-height:38px;max-height:160px;outline:none;
}
.comment-input:focus{border-color:var(--app-accent);}
.comment-send{
  width:36px;height:36px;border-radius:50%;border:none;
  background:var(--app-accent);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.82rem;flex-shrink:0;transition:opacity .12s;align-self:flex-end;
}
.comment-send:disabled{opacity:.3;}

/* Comment items */
.comment-item{padding:.6rem 0;}
.comment-item+.comment-item{border-top:1px solid var(--app-border);}
.comment-head{display:flex;align-items:center;gap:.4rem;margin-bottom:.25rem;}
.comment-author{font-size:.8rem;font-weight:700;color:var(--app-text);text-decoration:none;}
.comment-author:hover{color:var(--app-accent);}
.comment-time{font-size:.62rem;color:var(--app-muted);}
.comment-body{font-size:.84rem;line-height:1.55;color:var(--app-text);word-break:break-word;}
.comment-body p{margin:0 0 .25rem;}
.comment-body code{background:var(--app-elevated);padding:.05rem .25rem;border-radius:3px;font-size:.75rem;}
.comment-body pre{
  background:var(--app-elevated);border:1px solid var(--app-border);
  border-radius:var(--app-r-xs);padding:.5rem;overflow-x:auto;font-size:.72rem;margin:.3rem 0;
}
.comment-body pre code{background:none;padding:0;}
.comment-body a{color:var(--app-accent);}
.comment-acts{display:flex;gap:.5rem;margin-top:.25rem;font-size:.7rem;}
.comment-act{
  background:none;border:none;color:var(--app-muted);cursor:pointer;
  display:flex;align-items:center;gap:.2rem;padding:2px 4px;
  border-radius:4px;transition:color .1s;
}
.comment-act:hover{color:var(--app-text);}
.comment-act.liked{color:var(--app-red);}

/* Threaded replies */
.comment-replies{margin-left:1.2rem;padding-left:.8rem;border-left:2px solid var(--app-border);}
.reply-input-row{display:flex;gap:.3rem;margin-top:.4rem;align-items:center;}
.reply-input{
  flex:1;padding:.35rem .55rem;border-radius:16px;
  border:1px solid var(--app-border);background:var(--app-input);
  color:var(--app-text);font-size:.75rem;outline:none;
}
.reply-input:focus{border-color:var(--app-accent);}
.reply-send{
  width:28px;height:28px;border-radius:50%;border:none;
  background:var(--app-accent);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.7rem;
}

/* Lightbox */
.lightbox{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.95);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;cursor:zoom-out;
}
.lightbox.show{opacity:1;}
.lightbox img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:4px;user-select:none;-webkit-user-select:none;}
.lb-close{
  position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.1);color:#fff;border:none;cursor:pointer;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);
}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.1);color:#fff;border:none;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:background .12s;
}
.lb-nav:hover{background:rgba(255,255,255,.2);}
.lb-prev{left:12px;}.lb-next{right:12px;}
.lb-counter{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.6);font-size:.75rem;font-weight:600;
}

/* Loading */
.feed-loader{text-align:center;padding:2rem;color:var(--app-muted);}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:24px;height:24px;border:2.5px solid var(--app-border);
  border-top-color:var(--app-accent);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto;
}

/* Toast */
.toast-msg{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--app-text);color:var(--app-bg);
  padding:.45rem 1rem;border-radius:99px;font-size:.78rem;font-weight:600;
  z-index:500;opacity:0;transition:opacity .2s;pointer-events:none;
}
.toast-msg.show{opacity:1;}
</style>
{% endblock %}

{% block content %}
<div x-data="PostDetail()" x-init="init()" x-cloak>

  <!-- Sticky Header -->
  <div class="detail-header">
    <a href="/feed" class="detail-back"><i class="fas fa-arrow-left"></i></a>
    <span class="detail-header-title">Post</span>
  </div>

  <div class="detail-shell">

    <!-- Loading -->
    <div x-show="loading" class="feed-loader" style="padding:3rem;">
      <div class="spinner"></div>
    </div>

    <template x-if="post">
      <div>
        <!-- Post Card -->
        <div class="post-card">
          <div class="post-head">
            <a :href="'/feed/user/' + post.author.id" class="avatar" style="text-decoration:none;">
              <template x-if="post.author && post.author.avatar">
                <img :src="post.author.avatar" :alt="post.author.name">
              </template>
              <template x-if="!post.author || !post.author.avatar">
                <i class="fas fa-user"></i>
              </template>
            </a>
            <div class="post-author-col">
              <a :href="'/feed/user/' + post.author.id" class="post-author" x-text="post.author.name"></a>
              <div class="post-meta">
                <span class="post-type-dot" :class="'dot-' + post.post_type"></span>
                <span x-text="post.post_type" style="text-transform:capitalize;"></span>
                <span>&middot;</span>
                <span x-text="timeAgo(post.created_at)"></span>
              </div>
            </div>
          </div>

          <!-- Content -->
          <div class="post-text" x-html="renderMd(post.content)"></div>

          <!-- Media -->
          <template x-if="postImages(post).length === 1">
            <div class="post-single-img" @click="openLightbox(postImages(post), 0)">
              <img :src="postImages(post)[0]" alt="" loading="lazy">
            </div>
          </template>
          <template x-if="postImages(post).length > 1">
            <div class="media-grid" :class="'mg' + Math.min(postImages(post).length, 4)">
              <template x-for="(img, idx) in postImages(post).slice(0,4)" :key="idx">
                <div class="mg-item" @click="openLightbox(postImages(post), idx)">
                  <img :src="img" alt="" loading="lazy">
                  <div x-show="idx===3 && postImages(post).length>4" class="mg-more"
                       x-text="'+' + (postImages(post).length - 4)"></div>
                </div>
              </template>
            </div>
          </template>

          <!-- Challenge ref -->
          <a x-show="post.challenge_id" :href="'/community/challenge/' + post.challenge_id" class="post-chal-pill">
            <i class="fas fa-puzzle-piece" style="font-size:.65rem;"></i>
            <span x-text="post.challenge_name || 'Challenge #' + post.challenge_id"></span>
          </a>

          <!-- Tags -->
          <div x-show="post.tags && post.tags.length" class="post-tags">
            <template x-for="tag in post.tags" :key="tag">
              <span class="post-tag" x-text="'#' + tag"></span>
            </template>
          </div>

          <!-- Actions -->
          <div class="post-actions">
            <button class="pact" :class="{'liked': post.liked}" @click="toggleLike()">
              <i :class="post.liked ? 'fas fa-heart' : 'far fa-heart'"></i>
              <span class="count" x-text="post.like_count || ''"></span>
            </button>
            <span class="pact" style="cursor:default;">
              <i class="far fa-comment"></i>
              <span class="count" x-text="post.comment_count || ''"></span>
            </span>
            <button class="pact" @click="sharePost()">
              <i class="fas fa-share"></i>
            </button>
          </div>
        </div>

        <!-- Comments Section -->
        <div class="comments-section">
          <div class="comments-title">
            <i class="fas fa-comments" style="opacity:.4;font-size:.85rem;"></i>
            Comments
            <span class="comments-count" x-text="'(' + comments.length + ')'"></span>
          </div>

          <!-- New comment composer -->
          <div x-show="userId" class="comment-composer">
            <div class="avatar avatar-sm">
              <i class="fas fa-user"></i>
            </div>
            <textarea class="comment-input" x-model="newComment" rows="1"
                      placeholder="Write a comment..." @input="autoResize($event)"
                      @keydown.meta.enter="submitComment()"
                      @keydown.ctrl.enter="submitComment()"></textarea>
            <button class="comment-send" @click="submitComment()"
                    :disabled="!newComment.trim() || submitting">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>

          <!-- Empty -->
          <div x-show="!commentsLoading && comments.length === 0"
               style="text-align:center;color:var(--app-muted);font-size:.82rem;padding:2rem 1rem;">
            <i class="far fa-comment-dots" style="font-size:1.5rem;opacity:.3;display:block;margin-bottom:.4rem;"></i>
            No comments yet. Be the first!
          </div>

          <!-- Comments list -->
          <template x-for="c in comments" :key="c.id">
            <div class="comment-item">
              <div class="comment-head">
                <a :href="'/feed/user/' + c.author.id" class="avatar avatar-sm" style="text-decoration:none;">
                  <template x-if="c.author && c.author.avatar">
                    <img :src="c.author.avatar" :alt="c.author.name">
                  </template>
                  <template x-if="!c.author || !c.author.avatar">
                    <i class="fas fa-user"></i>
                  </template>
                </a>
                <a :href="'/feed/user/' + c.author.id" class="comment-author" x-text="c.author.name"></a>
                <span class="comment-time" x-text="timeAgo(c.created_at)"></span>
              </div>
              <div class="comment-body" x-html="renderMd(c.content)"></div>
              <div class="comment-acts">
                <button class="comment-act" :class="{'liked': c.liked}" @click="toggleCommentLike(c)">
                  <i :class="c.liked ? 'fas fa-heart' : 'far fa-heart'"></i>
                  <span x-text="c.like_count || ''"></span>
                </button>
                <button class="comment-act" @click="c._replying = !c._replying">
                  <i class="fas fa-reply"></i> Reply
                </button>
                <button x-show="c.is_author" class="comment-act" style="color:var(--app-red);"
                        @click="deleteComment(c)">
                  <i class="fas fa-trash-alt"></i>
                </button>
              </div>

              <!-- Reply composer -->
              <div x-show="c._replying" class="reply-input-row" x-transition>
                <input class="reply-input" x-model="c._replyText"
                       :placeholder="'Reply to ' + c.author.name + '...'"
                       @keydown.enter="submitReply(c)">
                <button class="reply-send" @click="submitReply(c)"
                        :disabled="!c._replyText || !c._replyText.trim()">
                  <i class="fas fa-paper-plane"></i>
                </button>
              </div>

              <!-- Threaded replies -->
              <div x-show="c.replies && c.replies.length" class="comment-replies">
                <template x-for="r in c.replies" :key="r.id">
                  <div class="comment-item" style="border:none;padding:.35rem 0;">
                    <div class="comment-head">
                      <a :href="'/feed/user/' + r.author.id" class="avatar avatar-xs" style="text-decoration:none;">
                        <template x-if="r.author && r.author.avatar">
                          <img :src="r.author.avatar" :alt="r.author.name">
                        </template>
                        <template x-if="!r.author || !r.author.avatar">
                          <i class="fas fa-user"></i>
                        </template>
                      </a>
                      <a :href="'/feed/user/' + r.author.id" class="comment-author" style="font-size:.75rem;" x-text="r.author.name"></a>
                      <span class="comment-time" x-text="timeAgo(r.created_at)"></span>
                    </div>
                    <div class="comment-body" style="font-size:.8rem;" x-html="renderMd(r.content)"></div>
                    <div class="comment-acts">
                      <button class="comment-act" :class="{'liked': r.liked}" @click="toggleCommentLike(r)">
                        <i :class="r.liked ? 'fas fa-heart' : 'far fa-heart'"></i>
                        <span x-text="r.like_count || ''"></span>
                      </button>
                      <button x-show="r.is_author" class="comment-act" style="color:var(--app-red);"
                              @click="deleteComment(r)">
                        <i class="fas fa-trash-alt"></i>
                      </button>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>

  <!-- Lightbox -->
  <div x-show="lb.open" class="lightbox" :class="{'show':lb.open}"
       @click.self="lb.open=false" x-transition.opacity>
    <button class="lb-close" @click="lb.open=false"><i class="fas fa-times"></i></button>
    <template x-if="lb.images.length>1">
      <button class="lb-nav lb-prev" @click.stop="lb.idx=(lb.idx-1+lb.images.length)%lb.images.length">
        <i class="fas fa-chevron-left"></i>
      </button>
    </template>
    <img :src="lb.images[lb.idx]||''" alt="" @click.stop>
    <template x-if="lb.images.length>1">
      <button class="lb-nav lb-next" @click.stop="lb.idx=(lb.idx+1)%lb.images.length">
        <i class="fas fa-chevron-right"></i>
      </button>
    </template>
    <div x-show="lb.images.length>1" class="lb-counter"
         x-text="(lb.idx+1)+' / '+lb.images.length"></div>
  </div>

  <!-- Toast -->
  <div class="toast-msg" :class="{'show':toastVisible}" x-text="toastMsg"></div>

  <!-- Bottom Nav Bar -->
  <nav class="app-bottom-nav">
    <a href="/feed" class="bnav-item">
      <i class="fas fa-home"></i><span class="bnav-label">Feed</span>
    </a>
    <a href="/feed" class="bnav-item">
      <i class="fas fa-bell"></i><span class="bnav-label">Alerts</span>
    </a>
    <div class="bnav-spacer"></div>
    <a href="/scoreboard" class="bnav-item">
      <i class="fas fa-trophy"></i><span class="bnav-label">Score</span>
    </a>
    <a :href="userId ? '/feed/user/' + userId : '/login'" class="bnav-item">
      <i class="fas fa-user"></i><span class="bnav-label">Profile</span>
    </a>
    <a href="/feed" class="bnav-item--create">
      <div class="bnav-create"><i class="fas fa-plus"></i></div>
    </a>
  </nav>

</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script>
function PostDetail(){
  var postId = {{ post_id }};
  return {
    postId:postId,
    post:null,
    comments:[],
    loading:true,
    commentsLoading:true,
    newComment:'',
    submitting:false,
    userId:window.init.userId||null,
    lb:{open:false,images:[],idx:0},
    toastVisible:false,toastMsg:'',

    async init(){
      await Promise.all([this.fetchPost(),this.fetchComments()]);
      this.loading=false;
      document.addEventListener('keydown',function(e){
        if(e.key==='Escape')this.lb.open=false;
      }.bind(this));
    },

    async fetchPost(){
      try{
        var r=await fetch('/feed/api/posts/'+this.postId);
        var j=await r.json();
        if(j.success)this.post=j.data;
      }catch(e){console.error(e);}
    },

    async fetchComments(){
      this.commentsLoading=true;
      try{
        var r=await fetch('/feed/api/posts/'+this.postId+'/comments');
        var j=await r.json();
        if(j.success){
          this.comments=j.data.map(function(c){return Object.assign({},c,{_replying:false,_replyText:''});});
        }
      }catch(e){console.error(e);}
      this.commentsLoading=false;
    },

    async submitComment(){
      if(!this.newComment.trim()||this.submitting)return;
      this.submitting=true;
      try{
        var r=await fetch('/feed/api/posts/'+this.postId+'/comments',{
          method:'POST',
          headers:{'Content-Type':'application/json','CSRF-Token':window.init.csrfNonce},
          body:JSON.stringify({content:this.newComment}),
        });
        var j=await r.json();
        if(j.success){
          this.newComment='';
          await this.fetchComments();
          if(this.post)this.post.comment_count=(this.post.comment_count||0)+1;
        }
      }catch(e){console.error(e);}
      this.submitting=false;
    },

    async submitReply(comment){
      if(!comment._replyText||!comment._replyText.trim())return;
      try{
        var r=await fetch('/feed/api/posts/'+this.postId+'/comments',{
          method:'POST',
          headers:{'Content-Type':'application/json','CSRF-Token':window.init.csrfNonce},
          body:JSON.stringify({content:comment._replyText,parent_id:comment.id}),
        });
        var j=await r.json();
        if(j.success){
          comment._replyText='';
          comment._replying=false;
          await this.fetchComments();
          if(this.post)this.post.comment_count=(this.post.comment_count||0)+1;
        }
      }catch(e){console.error(e);}
    },

    async toggleLike(){
      if(!this.post)return;
      var was=this.post.liked;
      this.post.liked=!was;
      this.post.like_count+=(was?-1:1);
      try{
        var r=await fetch('/feed/api/posts/'+this.postId+'/like',{
          method:'POST',
          headers:{'Content-Type':'application/json','CSRF-Token':window.init.csrfNonce},
        });
        var j=await r.json();
        if(j.success){this.post.liked=j.data.liked;this.post.like_count=j.data.like_count;}
        else{this.post.liked=was;this.post.like_count+=(was?1:-1);}
      }catch(e){this.post.liked=was;this.post.like_count+=(was?1:-1);}
    },

    async toggleCommentLike(c){
      var was=c.liked;c.liked=!was;c.like_count+=(was?-1:1);
      try{
        var r=await fetch('/feed/api/comments/'+c.id+'/like',{
          method:'POST',
          headers:{'Content-Type':'application/json','CSRF-Token':window.init.csrfNonce},
        });
        var j=await r.json();
        if(j.success){c.liked=j.data.liked;c.like_count=j.data.like_count;}
        else{c.liked=was;c.like_count+=(was?1:-1);}
      }catch(e){c.liked=was;c.like_count+=(was?1:-1);}
    },

    async deleteComment(c){
      if(!confirm('Delete this comment?'))return;
      try{
        await fetch('/feed/api/comments/'+c.id,{
          method:'DELETE',headers:{'CSRF-Token':window.init.csrfNonce},
        });
        await this.fetchComments();
        if(this.post)this.post.comment_count=Math.max(0,(this.post.comment_count||1)-1);
      }catch(e){}
    },

    sharePost(){
      var url=location.origin+'/feed/post/'+this.postId;
      if(navigator.clipboard)navigator.clipboard.writeText(url);
      this.showToast('Link copied!');
    },

    showToast(msg){
      this.toastMsg=msg;this.toastVisible=true;
      setTimeout(function(){this.toastVisible=false;}.bind(this),1800);
    },

    openLightbox(images,idx){this.lb={open:true,images:images,idx:idx};},
    postImages(post){
      if(post.images&&post.images.length)return post.images;
      if(post.image_url)return[post.image_url];
      return[];
    },
    renderMd(text){
      if(!text)return'';
      try{return DOMPurify.sanitize(marked.parse(text));}
      catch(e){return DOMPurify.sanitize(text);}
    },
    timeAgo(iso){
      if(!iso)return'';
      var d=(Date.now()-new Date(iso).getTime())/1000;
      if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m';
      if(d<86400)return Math.floor(d/3600)+'h';
      if(d<2592000)return Math.floor(d/86400)+'d';
      return Math.floor(d/2592000)+'mo';
    },
    autoResize(e){e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,200)+'px';},
  };
}
</script>
{% endblock %}
