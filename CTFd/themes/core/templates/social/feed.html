{% extends "base.html" %}

{% block stylesheets %}
{{ super() }}
<style>
[x-cloak] { display: none !important; }

:root, [data-bs-theme="light"] {
  --sf-bg:            #f3f4f6;
  --sf-surface:       #ffffff;
  --sf-elevated:      #f8f9fa;
  --sf-input:         #ffffff;
  --sf-text:          #111827;
  --sf-muted:         #6b7280;
  --sf-border:        #d1d5db;
  --sf-accent:        #6366f1;
  --sf-accent-rgb:    99,102,241;
  --sf-green:         #22c55e;
  --sf-red:           #ef4444;
  --sf-radius:        .55rem;
  --sf-radius-lg:     .85rem;
}
[data-bs-theme="dark"] {
  --sf-bg:            #0d1117;
  --sf-surface:       #161b22;
  --sf-elevated:      #1c2333;
  --sf-input:         #0d1117;
  --sf-text:          #e6edf3;
  --sf-muted:         #8b949e;
  --sf-border:        #30363d;
  --sf-accent:        #818cf8;
  --sf-accent-rgb:    129,140,248;
  --sf-green:         #4ade80;
  --sf-red:           #f87171;
}

body { background: var(--sf-bg); }

/* ── Layout ────────────────────────────────────────── */
.sf-layout { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

/* ── Tabs ──────────────────────────────────────────── */
.sf-tabs {
  display: flex; gap: .3rem; background: var(--sf-surface);
  border: 1px solid var(--sf-border); border-radius: var(--sf-radius-lg);
  padding: .3rem; margin-bottom: 1.2rem;
}
.sf-tab {
  flex: 1; padding: .55rem; border-radius: var(--sf-radius);
  text-align: center; font-size: .82rem; font-weight: 600;
  cursor: pointer; transition: all .15s; border: none;
  background: transparent; color: var(--sf-muted);
}
.sf-tab:hover { color: var(--sf-text); }
.sf-tab.active { background: var(--sf-accent); color: #fff; }

/* ── Composer ──────────────────────────────────────── */
.sf-composer {
  background: var(--sf-surface); border: 1px solid var(--sf-border);
  border-radius: var(--sf-radius-lg); padding: 1rem;
  margin-bottom: 1.2rem;
}
.sf-composer-top { display: flex; gap: .7rem; align-items: flex-start; }
.sf-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(var(--sf-accent-rgb),.1); border: 1px solid rgba(var(--sf-accent-rgb),.2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden; color: var(--sf-accent); font-size: .8rem;
}
.sf-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.sf-composer-input {
  flex: 1; min-height: 60px; padding: .6rem .8rem; border-radius: var(--sf-radius);
  border: 1px solid var(--sf-border); background: var(--sf-input);
  color: var(--sf-text); font-size: .88rem; resize: none;
  font-family: inherit; outline: none; transition: border-color .15s;
}
.sf-composer-input:focus { border-color: var(--sf-accent); }
.sf-composer-input::placeholder { color: var(--sf-muted); }

.sf-composer-bar {
  display: flex; align-items: center; gap: .3rem; margin-top: .6rem;
  padding-top: .6rem; border-top: 1px solid var(--sf-border);
}
.sf-type-btn {
  padding: .3rem .6rem; border-radius: 99px; border: 1px solid var(--sf-border);
  background: transparent; color: var(--sf-muted); cursor: pointer;
  font-size: .72rem; font-weight: 600; transition: all .15s;
  display: flex; align-items: center; gap: .25rem;
}
.sf-type-btn:hover { border-color: var(--sf-accent); color: var(--sf-accent); }
.sf-type-btn.active { background: rgba(var(--sf-accent-rgb),.1); border-color: var(--sf-accent); color: var(--sf-accent); }
.sf-post-btn {
  margin-left: auto; padding: .45rem 1.1rem; border-radius: var(--sf-radius);
  background: var(--sf-accent); color: #fff; border: none; cursor: pointer;
  font-size: .82rem; font-weight: 600; transition: opacity .15s;
}
.sf-post-btn:hover { opacity: .88; }
.sf-post-btn:disabled { opacity: .4; pointer-events: none; }

.sf-composer-extras {
  margin-top: .5rem; display: flex; flex-direction: column; gap: .4rem;
}
.sf-extra-input {
  width: 100%; padding: .4rem .7rem; border-radius: var(--sf-radius);
  border: 1px solid var(--sf-border); background: var(--sf-input);
  color: var(--sf-text); font-size: .8rem; outline: none;
}
.sf-extra-input:focus { border-color: var(--sf-accent); }

/* ── Post Card ─────────────────────────────────────── */
.sf-post {
  background: var(--sf-surface); border: 1px solid var(--sf-border);
  border-radius: var(--sf-radius-lg); padding: 1.1rem;
  margin-bottom: .8rem; transition: border-color .15s;
}
.sf-post:hover { border-color: rgba(var(--sf-accent-rgb),.3); }
.sf-post-header { display: flex; align-items: center; gap: .6rem; margin-bottom: .6rem; }
.sf-post-author-info { flex: 1; min-width: 0; }
.sf-post-author {
  font-size: .88rem; font-weight: 700; color: var(--sf-text);
  text-decoration: none; display: block;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sf-post-author:hover { color: var(--sf-accent); }
.sf-post-time { font-size: .72rem; color: var(--sf-muted); }
.sf-post-type-badge {
  font-size: .6rem; font-weight: 700; padding: .12rem .45rem;
  border-radius: 99px; text-transform: uppercase; letter-spacing: .8px;
}
.sf-type--text { background: rgba(var(--sf-accent-rgb),.1); color: var(--sf-accent); }
.sf-type--solve { background: rgba(34,197,94,.12); color: #16a34a; }
.sf-type--discussion { background: rgba(245,158,11,.12); color: #d97706; }
.sf-type--question { background: rgba(168,85,247,.12); color: #9333ea; }
.sf-post-pinned { font-size: .6rem; color: var(--sf-accent); font-weight: 700; margin-left: .4rem; }

/* Content */
.sf-post-content {
  font-size: .88rem; line-height: 1.65; color: var(--sf-text);
  word-break: break-word;
}
.sf-post-content p { margin: 0 0 .4rem; }
.sf-post-content pre {
  background: var(--sf-elevated); border: 1px solid var(--sf-border);
  border-radius: var(--sf-radius); padding: .7rem; overflow-x: auto;
  font-size: .78rem; margin: .5rem 0;
}
.sf-post-content code {
  background: var(--sf-elevated); padding: .08rem .3rem; border-radius: 3px;
  font-size: .82rem;
}
.sf-post-content pre code { background: none; padding: 0; }
.sf-post-content a { color: var(--sf-accent); }
.sf-post-content blockquote {
  border-left: 3px solid var(--sf-accent); padding-left: .7rem;
  color: var(--sf-muted); margin: .5rem 0;
}
.sf-post-content img { max-width: 100%; border-radius: var(--sf-radius); margin: .5rem 0; }

/* Challenge link */
.sf-challenge-link {
  display: inline-flex; align-items: center; gap: .3rem;
  padding: .3rem .65rem; border-radius: var(--sf-radius);
  background: rgba(var(--sf-accent-rgb),.06); border: 1px solid rgba(var(--sf-accent-rgb),.15);
  color: var(--sf-accent); font-size: .78rem; text-decoration: none;
  margin-top: .5rem; transition: border-color .15s;
}
.sf-challenge-link:hover { border-color: var(--sf-accent); color: var(--sf-accent); text-decoration: none; }

/* Image */
.sf-post-image {
  margin-top: .6rem; border-radius: var(--sf-radius);
  max-width: 100%; max-height: 400px; object-fit: cover;
}

/* Tags */
.sf-post-tags { display: flex; gap: .25rem; flex-wrap: wrap; margin-top: .5rem; }
.sf-post-tag {
  font-size: .6rem; padding: .1rem .4rem; border-radius: 99px;
  background: rgba(var(--sf-accent-rgb),.06); color: var(--sf-accent);
}

/* Actions bar */
.sf-actions {
  display: flex; gap: .1rem; margin-top: .7rem; padding-top: .6rem;
  border-top: 1px solid var(--sf-border);
}
.sf-action-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: .35rem;
  padding: .45rem; border-radius: var(--sf-radius); background: transparent;
  border: none; color: var(--sf-muted); font-size: .8rem; cursor: pointer;
  transition: all .12s;
}
.sf-action-btn:hover { background: var(--sf-elevated); color: var(--sf-text); }
.sf-action-btn.liked { color: var(--sf-red); }
.sf-action-btn .count { font-weight: 600; }

/* Delete / report dropdown */
.sf-post-menu {
  position: relative; margin-left: auto;
}
.sf-post-menu-btn {
  background: none; border: none; color: var(--sf-muted); cursor: pointer;
  padding: .2rem .4rem; border-radius: var(--sf-radius); font-size: .85rem;
}
.sf-post-menu-btn:hover { color: var(--sf-text); background: var(--sf-elevated); }
.sf-post-menu-drop {
  position: absolute; right: 0; top: 100%; z-index: 10;
  background: var(--sf-surface); border: 1px solid var(--sf-border);
  border-radius: var(--sf-radius); box-shadow: 0 8px 24px rgba(0,0,0,.12);
  min-width: 140px; padding: .3rem;
}
.sf-post-menu-item {
  display: block; width: 100%; padding: .4rem .7rem; border: none;
  background: transparent; color: var(--sf-text); font-size: .8rem;
  cursor: pointer; border-radius: 4px; text-align: left;
}
.sf-post-menu-item:hover { background: var(--sf-elevated); }
.sf-post-menu-item.danger { color: var(--sf-red); }

/* ── Loading / Empty ───────────────────────────────── */
.sf-loading { text-align: center; padding: 3rem; color: var(--sf-muted); }
@keyframes sf-pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.sf-loading i { animation: sf-pulse 1.2s infinite; font-size: 1.5rem; }
.sf-empty { text-align: center; padding: 3rem; color: var(--sf-muted); }
.sf-empty i { font-size: 2.5rem; opacity: .3; display: block; margin-bottom: .6rem; }

/* ── Pagination ────────────────────────────────────── */
.sf-load-more {
  display: block; width: 100%; padding: .6rem; border-radius: var(--sf-radius);
  background: var(--sf-surface); border: 1px solid var(--sf-border);
  color: var(--sf-accent); font-size: .85rem; font-weight: 600;
  cursor: pointer; text-align: center; transition: border-color .15s;
}
.sf-load-more:hover { border-color: var(--sf-accent); }

/* ── Notification bell ─────────────────────────────── */
.sf-notif-wrap { position: relative; }
.sf-notif-btn {
  padding: .45rem .7rem; border-radius: var(--sf-radius);
  border: 1px solid var(--sf-border); background: var(--sf-surface);
  color: var(--sf-muted); cursor: pointer; font-size: .9rem;
  position: relative; transition: border-color .15s;
}
.sf-notif-btn:hover { border-color: var(--sf-accent); color: var(--sf-accent); }
.sf-notif-badge {
  position: absolute; top: -4px; right: -4px;
  background: var(--sf-red); color: #fff; font-size: .55rem;
  font-weight: 700; padding: .12rem .35rem; border-radius: 99px;
  min-width: 16px; text-align: center; line-height: 1;
}
.sf-notif-panel {
  position: absolute; right: 0; top: calc(100% + .4rem); z-index: 20;
  width: 340px; max-height: 400px; overflow-y: auto;
  background: var(--sf-surface); border: 1px solid var(--sf-border);
  border-radius: var(--sf-radius-lg); box-shadow: 0 12px 40px rgba(0,0,0,.15);
}
.sf-notif-header {
  padding: .65rem .85rem; border-bottom: 1px solid var(--sf-border);
  display: flex; justify-content: space-between; align-items: center;
}
.sf-notif-title { font-size: .82rem; font-weight: 700; color: var(--sf-text); }
.sf-notif-mark-read {
  font-size: .72rem; color: var(--sf-accent); cursor: pointer;
  background: none; border: none;
}
.sf-notif-item {
  padding: .6rem .85rem; border-bottom: 1px solid var(--sf-border);
  display: flex; gap: .5rem; align-items: flex-start;
  transition: background .1s; cursor: pointer; text-decoration: none; color: inherit;
}
.sf-notif-item:hover { background: var(--sf-elevated); text-decoration: none; color: inherit; }
.sf-notif-item.unread { background: rgba(var(--sf-accent-rgb),.04); }
.sf-notif-text { font-size: .78rem; color: var(--sf-text); line-height: 1.35; }
.sf-notif-text strong { font-weight: 700; }
.sf-notif-time { font-size: .65rem; color: var(--sf-muted); margin-top: .15rem; }

/* ── Sidebar (optional trending) ───────────────────── */
.sf-sidebar-card {
  background: var(--sf-surface); border: 1px solid var(--sf-border);
  border-radius: var(--sf-radius-lg); padding: 1rem; margin-bottom: 1rem;
}
.sf-sidebar-title {
  font-size: .72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--sf-muted); margin-bottom: .7rem;
}

@media (max-width: 640px) {
  .sf-tabs { flex-wrap: wrap; }
  .sf-notif-panel { width: 280px; right: -60px; }
}
</style>
{% endblock %}

{% block content %}
<div x-data="SocialFeed()" x-init="init()" x-cloak>
  <div class="sf-layout">

    <!-- Header row -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <div style="font-size:1.3rem;font-weight:800;color:var(--sf-text);">
        <i class="fas fa-stream" style="opacity:.5;margin-right:.3rem;"></i> Feed
      </div>

      <!-- Notifications -->
      <div class="sf-notif-wrap" x-data="{ open: false }" @click.away="open = false">
        <button class="sf-notif-btn" @click="open = !open; if(open) loadNotifications()">
          <i class="fas fa-bell"></i>
          <span x-show="unreadCount > 0" class="sf-notif-badge" x-text="unreadCount"></span>
        </button>
        <div x-show="open" class="sf-notif-panel" x-transition>
          <div class="sf-notif-header">
            <span class="sf-notif-title">Notifications</span>
            <button class="sf-notif-mark-read" @click="markAllRead()">Mark all read</button>
          </div>
          <template x-if="notifications.length === 0">
            <div style="padding:1.5rem;text-align:center;color:var(--sf-muted);font-size:.82rem;">
              No notifications yet
            </div>
          </template>
          <template x-for="n in notifications" :key="n.id">
            <a :href="n.post_id ? '/feed/post/' + n.post_id : '#'"
               class="sf-notif-item" :class="{'unread': !n.read}">
              <div class="sf-avatar" style="width:28px;height:28px;font-size:.65rem;">
                <template x-if="n.actor && n.actor.avatar">
                  <img :src="n.actor.avatar" :alt="n.actor.name">
                </template>
                <template x-if="!n.actor || !n.actor.avatar">
                  <i class="fas fa-user"></i>
                </template>
              </div>
              <div>
                <div class="sf-notif-text">
                  <strong x-text="n.actor ? n.actor.name : 'Someone'"></strong>
                  <span x-text="verbText(n.verb)"></span>
                </div>
                <div class="sf-notif-time" x-text="timeAgo(n.created_at)"></div>
              </div>
            </a>
          </template>
        </div>
      </div>
    </div>

    <!-- Tabs: Global / Following / Trending -->
    <div class="sf-tabs">
      <button class="sf-tab" :class="{'active': mode === 'global'}"
              @click="mode = 'global'; resetFeed()">
        <i class="fas fa-globe"></i> Global
      </button>
      <button class="sf-tab" :class="{'active': mode === 'following'}"
              @click="mode = 'following'; resetFeed()">
        <i class="fas fa-users"></i> Following
      </button>
      <button class="sf-tab" :class="{'active': sort === 'trending'}"
              @click="sort = sort === 'trending' ? 'newest' : 'trending'; resetFeed()">
        <i class="fas fa-fire"></i> Trending
      </button>
    </div>

    <!-- Composer -->
    <div class="sf-composer" x-show="userId">
      <div class="sf-composer-top">
        <div class="sf-avatar">
          <template x-if="userAvatar">
            <img :src="userAvatar" alt="You">
          </template>
          <template x-if="!userAvatar">
            <i class="fas fa-user"></i>
          </template>
        </div>
        <textarea class="sf-composer-input" x-model="newPost.content"
                  placeholder="Share something with the community..."
                  @input="autoResize($event)"></textarea>
      </div>

      <!-- Extras toggle -->
      <div x-show="showExtras" class="sf-composer-extras" x-transition>
        <input class="sf-extra-input" type="text" x-model="newPost.tags"
               placeholder="Tags (comma-separated)">
        <input class="sf-extra-input" type="url" x-model="newPost.image_url"
               placeholder="Image URL (optional)">
        <input class="sf-extra-input" type="url" x-model="newPost.link_url"
               placeholder="Link URL (optional)">
        <input class="sf-extra-input" type="number" x-model.number="newPost.challenge_id"
               placeholder="Challenge ID reference (optional)">
      </div>

      <div class="sf-composer-bar">
        <button class="sf-type-btn" :class="{'active': newPost.post_type === 'text'}"
                @click="newPost.post_type = 'text'">
          <i class="fas fa-align-left"></i> Post
        </button>
        <button class="sf-type-btn" :class="{'active': newPost.post_type === 'discussion'}"
                @click="newPost.post_type = 'discussion'">
          <i class="fas fa-comments"></i> Discuss
        </button>
        <button class="sf-type-btn" :class="{'active': newPost.post_type === 'question'}"
                @click="newPost.post_type = 'question'">
          <i class="fas fa-question-circle"></i> Ask
        </button>
        <button class="sf-type-btn" @click="showExtras = !showExtras" title="More options">
          <i class="fas fa-ellipsis-h"></i>
        </button>
        <button class="sf-post-btn" @click="submitPost()" :disabled="!newPost.content.trim() || posting">
          <i class="fas fa-paper-plane" style="margin-right:.2rem;font-size:.7rem;"></i> Post
        </button>
      </div>
    </div>

    <!-- Type filter pills -->
    <div style="display:flex;gap:.3rem;margin-bottom:.8rem;flex-wrap:wrap;">
      <button class="sf-type-btn" :class="{'active': filterType === ''}" @click="filterType = ''; resetFeed()">All</button>
      <button class="sf-type-btn" :class="{'active': filterType === 'text'}" @click="filterType = 'text'; resetFeed()">
        <i class="fas fa-align-left"></i> Posts
      </button>
      <button class="sf-type-btn" :class="{'active': filterType === 'solve'}" @click="filterType = 'solve'; resetFeed()">
        <i class="fas fa-trophy"></i> Solves
      </button>
      <button class="sf-type-btn" :class="{'active': filterType === 'discussion'}" @click="filterType = 'discussion'; resetFeed()">
        <i class="fas fa-comments"></i> Discussions
      </button>
      <button class="sf-type-btn" :class="{'active': filterType === 'question'}" @click="filterType = 'question'; resetFeed()">
        <i class="fas fa-question-circle"></i> Questions
      </button>
    </div>

    <!-- Loading -->
    <div x-show="loading && posts.length === 0" class="sf-loading">
      <i class="fas fa-circle-notch fa-spin"></i>
      <p style="margin-top:.5rem;font-size:.82rem;">Loading feed...</p>
    </div>

    <!-- Empty -->
    <div x-show="!loading && posts.length === 0" class="sf-empty">
      <i class="fas fa-inbox"></i>
      <p>No posts yet. Be the first to share something!</p>
    </div>

    <!-- Posts -->
    <template x-for="post in posts" :key="post.id">
      <div class="sf-post">
        <!-- Header -->
        <div class="sf-post-header">
          <a :href="'/feed/user/' + post.author.id" class="sf-avatar" style="text-decoration:none;">
            <template x-if="post.author && post.author.avatar">
              <img :src="post.author.avatar" :alt="post.author.name">
            </template>
            <template x-if="!post.author || !post.author.avatar">
              <i class="fas fa-user"></i>
            </template>
          </a>
          <div class="sf-post-author-info">
            <a :href="'/feed/user/' + post.author.id" class="sf-post-author" x-text="post.author.name"></a>
            <div class="sf-post-time">
              <span x-text="timeAgo(post.created_at)"></span>
              <span x-show="post.pinned" class="sf-post-pinned"><i class="fas fa-thumbtack"></i> Pinned</span>
            </div>
          </div>
          <span class="sf-post-type-badge"
                :class="'sf-type--' + post.post_type"
                x-text="post.post_type"></span>

          <!-- Menu -->
          <div class="sf-post-menu" x-data="{ open: false }" @click.away="open = false">
            <button class="sf-post-menu-btn" @click="open = !open">
              <i class="fas fa-ellipsis-h"></i>
            </button>
            <div x-show="open" class="sf-post-menu-drop" x-transition>
              <button x-show="post.is_author" class="sf-post-menu-item danger"
                      @click="deletePost(post.id); open = false">
                <i class="fas fa-trash"></i> Delete
              </button>
              <button class="sf-post-menu-item" @click="reportPost(post.id); open = false">
                <i class="fas fa-flag"></i> Report
              </button>
            </div>
          </div>
        </div>

        <!-- Content -->
        <div class="sf-post-content" x-html="renderMd(post.content)"></div>

        <!-- Challenge reference -->
        <a x-show="post.challenge_id" :href="'/community/challenge/' + post.challenge_id" class="sf-challenge-link">
          <i class="fas fa-puzzle-piece"></i>
          <span x-text="post.challenge_name || 'Challenge #' + post.challenge_id"></span>
        </a>

        <!-- Image -->
        <img x-show="post.image_url" :src="post.image_url" class="sf-post-image" alt="Post image"
             onerror="this.style.display='none'">

        <!-- Tags -->
        <div x-show="post.tags && post.tags.length" class="sf-post-tags">
          <template x-for="tag in post.tags" :key="tag">
            <span class="sf-post-tag" x-text="'#' + tag"></span>
          </template>
        </div>

        <!-- Actions -->
        <div class="sf-actions">
          <button class="sf-action-btn" :class="{'liked': post.liked}" @click="toggleLike(post)">
            <i :class="post.liked ? 'fas fa-heart' : 'far fa-heart'"></i>
            <span class="count" x-text="post.like_count || ''"></span>
          </button>
          <a :href="'/feed/post/' + post.id" class="sf-action-btn" style="text-decoration:none;">
            <i class="far fa-comment"></i>
            <span class="count" x-text="post.comment_count || ''"></span>
          </a>
          <button class="sf-action-btn" @click="sharePost(post)">
            <i class="fas fa-share"></i>
          </button>
        </div>
      </div>
    </template>

    <!-- Load More -->
    <button x-show="hasMore && !loading" class="sf-load-more" @click="loadMore()">
      Load more posts
    </button>
    <div x-show="loading && posts.length > 0" class="sf-loading" style="padding:1.5rem;">
      <i class="fas fa-circle-notch fa-spin"></i>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script>
function SocialFeed() {
  return {
    posts: [],
    loading: true,
    page: 1,
    hasMore: false,
    mode: 'global',
    sort: 'newest',
    filterType: '',
    posting: false,
    showExtras: false,
    notifications: [],
    unreadCount: 0,
    userId: init.userId || null,
    userName: init.userName || null,
    userAvatar: null,

    newPost: {
      content: '',
      post_type: 'text',
      tags: '',
      image_url: '',
      link_url: '',
      challenge_id: null,
    },

    async init() {
      await this.fetchPosts();
      if (this.userId) {
        this.fetchUnreadCount();
        // Load user avatar
        try {
          const r = await fetch('/feed/api/users/' + this.userId + '/profile');
          const j = await r.json();
          if (j.success) this.userAvatar = j.data.avatar;
        } catch(e) {}
      }
    },

    async fetchPosts() {
      this.loading = true;
      const params = new URLSearchParams({
        page: this.page, per_page: 20, mode: this.mode, sort: this.sort,
      });
      if (this.filterType) params.set('type', this.filterType);

      try {
        const resp = await fetch('/feed/api/posts?' + params);
        const json = await resp.json();
        if (json.success) {
          if (this.page === 1) {
            this.posts = json.data;
          } else {
            this.posts = [...this.posts, ...json.data];
          }
          this.hasMore = json.meta.pagination.has_next;
        }
      } catch(e) { console.error(e); }
      this.loading = false;
    },

    resetFeed() { this.page = 1; this.posts = []; this.fetchPosts(); },
    loadMore() { this.page++; this.fetchPosts(); },

    async submitPost() {
      if (!this.newPost.content.trim() || this.posting) return;
      this.posting = true;
      try {
        const body = { ...this.newPost };
        if (!body.challenge_id) delete body.challenge_id;
        const resp = await fetch('/feed/api/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'CSRF-Token': init.csrfNonce },
          body: JSON.stringify(body),
        });
        const json = await resp.json();
        if (json.success) {
          this.newPost = { content: '', post_type: 'text', tags: '', image_url: '', link_url: '', challenge_id: null };
          this.showExtras = false;
          this.page = 1;
          await this.fetchPosts();
        }
      } catch(e) { console.error(e); }
      this.posting = false;
    },

    async toggleLike(post) {
      try {
        const resp = await fetch('/feed/api/posts/' + post.id + '/like', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'CSRF-Token': init.csrfNonce },
        });
        const json = await resp.json();
        if (json.success) {
          post.liked = json.data.liked;
          post.like_count = json.data.like_count;
        }
      } catch(e) {}
    },

    async deletePost(id) {
      if (!confirm('Delete this post?')) return;
      try {
        await fetch('/feed/api/posts/' + id, {
          method: 'DELETE',
          headers: { 'CSRF-Token': init.csrfNonce },
        });
        this.posts = this.posts.filter(p => p.id !== id);
      } catch(e) {}
    },

    reportPost(id) {
      const reason = prompt('Report reason:');
      if (!reason) return;
      fetch('/feed/api/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'CSRF-Token': init.csrfNonce },
        body: JSON.stringify({ post_id: id, reason }),
      });
    },

    sharePost(post) {
      const url = window.location.origin + '/feed/post/' + post.id;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url);
        alert('Link copied!');
      }
    },

    // Notifications
    async fetchUnreadCount() {
      try {
        const r = await fetch('/feed/api/notifications/count');
        const j = await r.json();
        if (j.success) this.unreadCount = j.data.count;
      } catch(e) {}
    },

    async loadNotifications() {
      try {
        const r = await fetch('/feed/api/notifications');
        const j = await r.json();
        if (j.success) {
          this.notifications = j.data;
          this.unreadCount = j.meta.unread_count;
        }
      } catch(e) {}
    },

    async markAllRead() {
      try {
        await fetch('/feed/api/notifications/read', {
          method: 'POST',
          headers: { 'CSRF-Token': init.csrfNonce },
        });
        this.unreadCount = 0;
        this.notifications = this.notifications.map(n => ({ ...n, read: true }));
      } catch(e) {}
    },

    verbText(v) {
      const map = {
        liked_post: 'liked your post',
        commented: 'commented on your post',
        replied: 'replied to your comment',
        followed: 'started following you',
        liked_comment: 'liked your comment',
      };
      return map[v] || v;
    },

    // Helpers
    renderMd(text) {
      if (!text) return '';
      try { return DOMPurify.sanitize(marked.parse(text)); }
      catch(e) { return DOMPurify.sanitize(text); }
    },

    timeAgo(iso) {
      if (!iso) return '';
      const diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 2592000) return Math.floor(diff / 86400) + 'd ago';
      return Math.floor(diff / 2592000) + 'mo ago';
    },

    autoResize(e) {
      e.target.style.height = 'auto';
      e.target.style.height = Math.min(e.target.scrollHeight, 300) + 'px';
    },
  };
}
</script>
{% endblock %}
