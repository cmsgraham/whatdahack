{% extends "base.html" %}

{% block stylesheets %}
{{ super() }}
<style>
[x-cloak]{display:none!important}
*,*::before,*::after{box-sizing:border-box}

:root,[data-bs-theme="light"]{
  --app-bg:#f0f2f5;--app-surface:#fff;--app-elevated:#f8f9fa;
  --app-input:#fff;--app-text:#0f1419;--app-text2:#536471;
  --app-muted:#8b98a5;--app-border:rgba(0,0,0,.06);
  --app-accent:#6366f1;--app-accent-rgb:99,102,241;
  --app-accent2:#818cf8;--app-red:#ef4444;--app-red-rgb:239,68,68;
  --app-green:#22c55e;--app-gold:#f59e0b;
  --app-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --app-shadow-lg:0 10px 40px rgba(0,0,0,.08);
  --app-r:16px;--app-r-sm:10px;--app-r-xs:6px;
}
[data-bs-theme="dark"]{
  --app-bg:#000;--app-surface:#16181c;--app-elevated:#1d1f23;
  --app-input:#202327;--app-text:#e7e9ea;--app-text2:#71767b;
  --app-muted:#536471;--app-border:rgba(255,255,255,.06);
  --app-accent:#818cf8;--app-accent-rgb:129,140,248;
  --app-accent2:#a5b4fc;--app-red:#f87171;--app-red-rgb:248,113,113;
  --app-green:#4ade80;--app-gold:#fbbf24;
  --app-shadow:0 1px 3px rgba(0,0,0,.3);
  --app-shadow-lg:0 10px 40px rgba(0,0,0,.4);
}

body{
  background:var(--app-bg)!important;margin:0;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--app-text);
}
.navbar{position:sticky;top:0;z-index:100;}

/* Layout */
.profile-shell{max-width:600px;margin:0 auto;min-height:100vh;padding-bottom:calc(70px + env(safe-area-inset-bottom,0px));}

/* Bottom Nav */
.app-bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:90;
  background:var(--app-surface);
  border-top:1px solid var(--app-border);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
[data-bs-theme="dark"] .app-bottom-nav{background:rgba(22,24,28,.92);}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:.55rem 0 .35rem;gap:.15rem;cursor:pointer;
  color:var(--app-muted);text-decoration:none;transition:color .12s;
  border:none;background:none;font-family:inherit;
}
.bnav-item:hover,.bnav-item.active{color:var(--app-accent);}
.bnav-item i{font-size:1.15rem;}
.bnav-label{font-size:.6rem;font-weight:600;letter-spacing:.5px;}
@media(min-width:640px){
  .app-bottom-nav{display:none;}
  .profile-shell{padding-bottom:0;}
}

/* Back bar */
.profile-header{
  position:sticky;top:56px;z-index:50;
  border-bottom:1px solid var(--app-border);
  padding:.55rem 1rem;display:flex;align-items:center;gap:.6rem;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  background:rgba(255,255,255,.85);
}
[data-bs-theme="dark"] .profile-header{background:rgba(22,24,28,.85);}
.profile-back{
  width:34px;height:34px;border-radius:50%;border:none;
  background:var(--app-elevated);display:flex;align-items:center;justify-content:center;
  color:var(--app-text);cursor:pointer;transition:background .15s;font-size:.85rem;
  text-decoration:none;
}
.profile-back:hover{background:rgba(var(--app-accent-rgb),.1);color:var(--app-accent);}
.profile-header-name{font-size:1rem;font-weight:800;letter-spacing:-.02em;}

/* Avatar */
.avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;overflow:hidden;
  background:linear-gradient(135deg,rgba(var(--app-accent-rgb),.15),rgba(var(--app-accent-rgb),.05));
  display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(var(--app-accent-rgb),.15);
  color:var(--app-accent);font-size:.85rem;
}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-sm{width:34px;height:34px;font-size:.75rem;border-width:1.5px;}
.avatar-xs{width:26px;height:26px;font-size:.6rem;border-width:1px;}
.avatar-xl{
  width:80px;height:80px;font-size:1.6rem;
  border-width:3px;border-color:rgba(var(--app-accent-rgb),.2);
}

/* Profile card */
.profile-card{
  background:var(--app-surface);border-bottom:1px solid var(--app-border);
  padding:1.5rem 1rem;text-align:center;
}
.profile-name{font-size:1.15rem;font-weight:800;margin-top:.6rem;letter-spacing:-.02em;}
.profile-handle{font-size:.75rem;color:var(--app-muted);margin-bottom:.6rem;}

.rank-badge{
  display:inline-flex;align-items:center;gap:.3rem;
  padding:.25rem .7rem;border-radius:99px;
  background:linear-gradient(135deg,rgba(var(--app-accent-rgb),.08),rgba(var(--app-accent-rgb),.02));
  color:var(--app-accent);font-size:.72rem;font-weight:700;margin-bottom:.8rem;
}

.profile-stats{
  display:flex;justify-content:center;gap:0;
  padding:.7rem 0;
  border-top:1px solid var(--app-border);border-bottom:1px solid var(--app-border);
  margin-bottom:.8rem;
}
.profile-stat{flex:1;text-align:center;position:relative;}
.profile-stat+.profile-stat::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;width:1px;
  background:var(--app-border);
}
.stat-val{font-size:1.05rem;font-weight:800;line-height:1.3;}
.stat-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--app-muted);}

.follow-btn{
  padding:.5rem 1.8rem;border-radius:99px;font-size:.82rem;
  font-weight:700;cursor:pointer;transition:all .15s;
  border:none;
}
.follow-btn.follow{
  background:var(--app-accent);color:#fff;
  box-shadow:0 2px 8px rgba(var(--app-accent-rgb),.3);
}
.follow-btn.follow:hover{opacity:.88;transform:scale(1.02);}
.follow-btn.unfollow{
  background:transparent;color:var(--app-accent);
  border:2px solid rgba(var(--app-accent-rgb),.3);
}
.follow-btn.unfollow:hover{border-color:var(--app-red);color:var(--app-red);}

/* Activity section title */
.activity-title{
  padding:.7rem 1rem;font-size:.7rem;font-weight:700;color:var(--app-muted);
  text-transform:uppercase;letter-spacing:1.5px;
  display:flex;align-items:center;gap:.4rem;
}

/* Post card */
.post-card{
  background:var(--app-surface);border-bottom:1px solid var(--app-border);
  padding:1rem;transition:background .1s;animation:fadeUp .3s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.post-card:active{background:var(--app-elevated);}

.post-head{display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem;}
.post-author-col{flex:1;min-width:0;}
.post-author{
  font-size:.88rem;font-weight:700;color:var(--app-text);
  text-decoration:none;display:block;line-height:1.2;
}
.post-author:hover{color:var(--app-accent);}
.post-meta{font-size:.68rem;color:var(--app-muted);display:flex;align-items:center;gap:.3rem;}
.post-type-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.dot-text{background:var(--app-accent);}
.dot-solve{background:var(--app-green);}
.dot-discussion{background:var(--app-gold);}
.dot-question{background:#a855f7;}

.post-text{font-size:.9rem;line-height:1.6;word-break:break-word;margin-bottom:.4rem;}
.post-text p{margin:0 0 .3rem;}
.post-text a{color:var(--app-accent);}
.post-text code{background:var(--app-elevated);padding:.1rem .3rem;border-radius:4px;font-size:.8rem;}
.post-text pre{
  background:var(--app-elevated);border:1px solid var(--app-border);
  border-radius:var(--app-r-xs);padding:.6rem;overflow-x:auto;font-size:.75rem;margin:.4rem 0;
}
.post-text pre code{background:none;padding:0;}
.post-text blockquote{border-left:3px solid var(--app-accent);padding-left:.6rem;color:var(--app-text2);margin:.4rem 0;}

/* Media Grid */
.media-grid{
  display:grid;gap:2px;border-radius:var(--app-r);overflow:hidden;margin-top:.5rem;cursor:pointer;
}
.media-grid.mg1{grid-template-columns:1fr;}
.media-grid.mg2{grid-template-columns:1fr 1fr;}
.media-grid.mg3{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr;}
.media-grid.mg3 .mg-item:first-child{grid-row:1/3;}
.media-grid.mg4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.mg-item{position:relative;overflow:hidden;background:var(--app-elevated);min-height:0;}
.mg-item.single{max-height:450px;}
.mg-item:not(.single){aspect-ratio:1;}
.mg-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s;}
.mg-item:hover img{transform:scale(1.02);}
.mg-more{
  position:absolute;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:1.3rem;font-weight:800;
}
.post-single-img{
  border-radius:var(--app-r);overflow:hidden;margin-top:.5rem;max-height:450px;cursor:pointer;
}
.post-single-img img{width:100%;max-height:450px;object-fit:cover;display:block;transition:transform .2s;}
.post-single-img:hover img{transform:scale(1.01);}

.post-chal-pill{
  display:inline-flex;align-items:center;gap:.3rem;
  padding:.25rem .6rem;border-radius:99px;font-size:.72rem;
  background:rgba(var(--app-accent-rgb),.06);border:1px solid rgba(var(--app-accent-rgb),.12);
  color:var(--app-accent);text-decoration:none;margin-top:.4rem;transition:border-color .12s;
}
.post-chal-pill:hover{border-color:var(--app-accent);color:var(--app-accent);text-decoration:none;}
.post-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:.35rem;}
.post-tag{font-size:.6rem;padding:2px 7px;border-radius:99px;background:rgba(var(--app-accent-rgb),.05);color:var(--app-accent);font-weight:600;}

/* Interaction Bar */
.post-actions{display:flex;margin-top:.6rem;gap:0;}
.pact{
  flex:1;display:flex;align-items:center;justify-content:center;gap:.35rem;
  padding:.5rem;border-radius:var(--app-r-xs);background:none;border:none;
  color:var(--app-muted);font-size:.82rem;cursor:pointer;transition:all .12s;font-family:inherit;
}
.pact:hover{background:var(--app-elevated);color:var(--app-text);}
.pact .count{font-size:.75rem;font-weight:600;}
.pact.liked{color:var(--app-red);}
.pact.liked i{animation:heartPop .35s ease;}
@keyframes heartPop{0%{transform:scale(1)}25%{transform:scale(1.3)}50%{transform:scale(.95)}100%{transform:scale(1)}}

/* Lightbox */
.lightbox{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.95);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;cursor:zoom-out;
}
.lightbox.show{opacity:1;}
.lightbox img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:4px;user-select:none;-webkit-user-select:none;}
.lb-close{
  position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.1);color:#fff;border:none;cursor:pointer;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);
}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.1);color:#fff;border:none;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:background .12s;
}
.lb-nav:hover{background:rgba(255,255,255,.2);}
.lb-prev{left:12px;}.lb-next{right:12px;}
.lb-counter{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.6);font-size:.75rem;font-weight:600;
}

/* Empty & Loading */
.empty-state{padding:3rem 2rem;text-align:center;}
.empty-icon{
  width:70px;height:70px;border-radius:50%;margin:0 auto .8rem;
  background:linear-gradient(135deg,rgba(var(--app-accent-rgb),.08),rgba(var(--app-accent-rgb),.02));
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;color:var(--app-accent);opacity:.5;
}
.empty-title{font-size:.92rem;font-weight:700;margin-bottom:.2rem;}
.empty-desc{font-size:.78rem;color:var(--app-muted);line-height:1.4;}

.feed-loader{text-align:center;padding:2rem;color:var(--app-muted);}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:24px;height:24px;border:2.5px solid var(--app-border);
  border-top-color:var(--app-accent);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto;
}

.load-more-btn{
  display:block;width:calc(100% - 2rem);margin:0 1rem 1rem;
  padding:.6rem;border-radius:var(--app-r-sm);
  background:var(--app-surface);border:1px solid var(--app-border);
  color:var(--app-accent);font-size:.82rem;font-weight:600;
  cursor:pointer;text-align:center;transition:border-color .12s;
}
.load-more-btn:hover{border-color:var(--app-accent);}

/* Toast */
.toast-msg{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--app-text);color:var(--app-bg);
  padding:.45rem 1rem;border-radius:99px;font-size:.78rem;font-weight:600;
  z-index:500;opacity:0;transition:opacity .2s;pointer-events:none;
}
.toast-msg.show{opacity:1;}
</style>
{% endblock %}

{% block content %}
<div x-data="UserProfile()" x-init="init()" x-cloak>

  <!-- Sticky Header -->
  <div class="profile-header">
    <a href="/feed" class="profile-back"><i class="fas fa-arrow-left"></i></a>
    <span class="profile-header-name" x-text="profile ? profile.name : 'Profile'"></span>
  </div>

  <div class="profile-shell">

    <!-- Loading -->
    <div x-show="loading" class="feed-loader" style="padding:3rem;">
      <div class="spinner"></div>
    </div>

    <template x-if="profile">
      <div>
        <!-- Profile Card -->
        <div class="profile-card">
          <div class="avatar avatar-xl" style="margin:0 auto;">
            <template x-if="profile.avatar">
              <img :src="profile.avatar" :alt="profile.name">
            </template>
            <template x-if="!profile.avatar">
              <i class="fas fa-user"></i>
            </template>
          </div>
          <div class="profile-name" x-text="profile.name"></div>
          <div class="profile-handle" x-text="'@' + profile.name.toLowerCase().replace(/\\s+/g, '')"></div>

          <div x-show="profile.place" class="rank-badge">
            <i class="fas fa-trophy" style="font-size:.65rem;"></i>
            Rank #<span x-text="profile.place"></span>
            <span style="opacity:.4;">&middot;</span>
            <span x-text="profile.score + ' pts'"></span>
          </div>

          <div class="profile-stats">
            <div class="profile-stat">
              <div class="stat-val" x-text="profile.post_count"></div>
              <div class="stat-label">Posts</div>
            </div>
            <div class="profile-stat">
              <div class="stat-val" x-text="profile.follower_count"></div>
              <div class="stat-label">Followers</div>
            </div>
            <div class="profile-stat">
              <div class="stat-val" x-text="profile.following_count"></div>
              <div class="stat-label">Following</div>
            </div>
            <div class="profile-stat">
              <div class="stat-val" x-text="profile.challenges_created"></div>
              <div class="stat-label">Challenges</div>
            </div>
          </div>

          <button x-show="userId && userId !== profileUserId"
                  class="follow-btn" :class="profile.is_following ? 'unfollow' : 'follow'"
                  @click="toggleFollow()">
            <span x-text="profile.is_following ? 'Unfollow' : 'Follow'"></span>
          </button>
        </div>

        <!-- Activity title -->
        <div class="activity-title">
          <i class="fas fa-stream" style="opacity:.4;"></i> Activity
        </div>

        <!-- Empty -->
        <div x-show="!postsLoading && posts.length === 0" class="empty-state">
          <div class="empty-icon"><i class="fas fa-inbox"></i></div>
          <div class="empty-title">No posts yet</div>
          <div class="empty-desc">This user hasn't shared anything yet.</div>
        </div>

        <!-- Posts -->
        <template x-for="post in posts" :key="post.id">
          <div class="post-card">
            <div class="post-head">
              <div class="avatar avatar-sm">
                <template x-if="post.author && post.author.avatar">
                  <img :src="post.author.avatar" :alt="post.author.name">
                </template>
                <template x-if="!post.author || !post.author.avatar">
                  <i class="fas fa-user"></i>
                </template>
              </div>
              <div class="post-author-col">
                <span class="post-author" style="cursor:default;" x-text="post.author.name"></span>
                <div class="post-meta">
                  <span class="post-type-dot" :class="'dot-' + post.post_type"></span>
                  <span x-text="post.post_type" style="text-transform:capitalize;"></span>
                  <span>&middot;</span>
                  <span x-text="timeAgo(post.created_at)"></span>
                </div>
              </div>
            </div>

            <div class="post-text" x-html="renderMd(post.content)"></div>

            <!-- Media -->
            <template x-if="postImages(post).length === 1">
              <div class="post-single-img" @click="openLightbox(postImages(post), 0)">
                <img :src="postImages(post)[0]" alt="" loading="lazy">
              </div>
            </template>
            <template x-if="postImages(post).length > 1">
              <div class="media-grid" :class="'mg' + Math.min(postImages(post).length, 4)">
                <template x-for="(img, idx) in postImages(post).slice(0,4)" :key="idx">
                  <div class="mg-item" @click="openLightbox(postImages(post), idx)">
                    <img :src="img" alt="" loading="lazy">
                    <div x-show="idx===3 && postImages(post).length>4" class="mg-more"
                         x-text="'+' + (postImages(post).length - 4)"></div>
                  </div>
                </template>
              </div>
            </template>

            <a x-show="post.challenge_id" :href="'/community/challenge/' + post.challenge_id" class="post-chal-pill">
              <i class="fas fa-puzzle-piece" style="font-size:.65rem;"></i>
              <span x-text="post.challenge_name || 'Challenge #' + post.challenge_id"></span>
            </a>

            <div x-show="post.tags && post.tags.length" class="post-tags">
              <template x-for="tag in post.tags" :key="tag">
                <span class="post-tag" x-text="'#' + tag"></span>
              </template>
            </div>

            <div class="post-actions">
              <button class="pact" :class="{'liked': post.liked}" @click="toggleLike(post)">
                <i :class="post.liked ? 'fas fa-heart' : 'far fa-heart'"></i>
                <span class="count" x-text="post.like_count || ''"></span>
              </button>
              <a :href="'/feed/post/' + post.id" class="pact" style="text-decoration:none;">
                <i class="far fa-comment"></i>
                <span class="count" x-text="post.comment_count || ''"></span>
              </a>
              <button class="pact" @click="sharePost(post)">
                <i class="fas fa-share"></i>
              </button>
            </div>
          </div>
        </template>

        <!-- Load More -->
        <button x-show="hasMore && !postsLoading" class="load-more-btn" @click="loadMore()">
          Load more posts
        </button>
        <div x-show="postsLoading && posts.length > 0" class="feed-loader" style="padding:1rem;">
          <div class="spinner"></div>
        </div>
      </div>
    </template>
  </div>

  <!-- Lightbox -->
  <div x-show="lb.open" class="lightbox" :class="{'show':lb.open}"
       @click.self="lb.open=false" x-transition.opacity>
    <button class="lb-close" @click="lb.open=false"><i class="fas fa-times"></i></button>
    <template x-if="lb.images.length>1">
      <button class="lb-nav lb-prev" @click.stop="lb.idx=(lb.idx-1+lb.images.length)%lb.images.length">
        <i class="fas fa-chevron-left"></i>
      </button>
    </template>
    <img :src="lb.images[lb.idx]||''" alt="" @click.stop>
    <template x-if="lb.images.length>1">
      <button class="lb-nav lb-next" @click.stop="lb.idx=(lb.idx+1)%lb.images.length">
        <i class="fas fa-chevron-right"></i>
      </button>
    </template>
    <div x-show="lb.images.length>1" class="lb-counter"
         x-text="(lb.idx+1)+' / '+lb.images.length"></div>
  </div>

  <!-- Toast -->
  <div class="toast-msg" :class="{'show':toastVisible}" x-text="toastMsg"></div>

  <!-- Bottom Nav Bar -->
  <nav class="app-bottom-nav">
    <a href="/feed" class="bnav-item">
      <i class="fas fa-home"></i><span class="bnav-label">Feed</span>
    </a>
    <a href="/feed" class="bnav-item" style="padding-top:0;">
      <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--app-accent),var(--app-accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem;margin-top:-14px;box-shadow:0 4px 14px rgba(var(--app-accent-rgb),.35);"><i class="fas fa-plus"></i></div>
    </a>
    <a href="/feed" class="bnav-item">
      <i class="fas fa-bell"></i><span class="bnav-label">Alerts</span>
    </a>
    <a :href="userId ? '/feed/user/' + userId : '/login'" class="bnav-item active">
      <i class="fas fa-user"></i><span class="bnav-label">Profile</span>
    </a>
  </nav>

</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script>
function UserProfile(){
  var profileUserId = {{ profile_user_id }};
  return {
    profileUserId:profileUserId,
    profile:null,
    posts:[],
    loading:true,
    postsLoading:false,
    page:1,
    hasMore:false,
    userId:window.init.userId||null,
    lb:{open:false,images:[],idx:0},
    toastVisible:false,toastMsg:'',

    async init(){
      await Promise.all([this.fetchProfile(),this.fetchPosts()]);
      this.loading=false;
      document.addEventListener('keydown',function(e){
        if(e.key==='Escape')this.lb.open=false;
      }.bind(this));
    },

    async fetchProfile(){
      try{
        var r=await fetch('/feed/api/users/'+this.profileUserId+'/profile');
        var j=await r.json();
        if(j.success)this.profile=j.data;
      }catch(e){console.error(e);}
    },

    async fetchPosts(){
      this.postsLoading=true;
      try{
        var params=new URLSearchParams({
          page:this.page,per_page:20,user_id:this.profileUserId,
        });
        var r=await fetch('/feed/api/posts?'+params);
        var j=await r.json();
        if(j.success){
          if(this.page===1)this.posts=j.data;
          else this.posts=this.posts.concat(j.data);
          this.hasMore=j.meta.pagination.has_next;
        }
      }catch(e){console.error(e);}
      this.postsLoading=false;
    },

    loadMore(){this.page++;this.fetchPosts();},

    async toggleFollow(){
      try{
        var r=await fetch('/feed/api/users/'+this.profileUserId+'/follow',{
          method:'POST',
          headers:{'Content-Type':'application/json','CSRF-Token':window.init.csrfNonce},
        });
        var j=await r.json();
        if(j.success){
          this.profile.is_following=j.data.following;
          this.profile.follower_count+=j.data.following?1:-1;
        }
      }catch(e){}
    },

    async toggleLike(post){
      var was=post.liked;
      post.liked=!was;post.like_count+=(was?-1:1);
      try{
        var r=await fetch('/feed/api/posts/'+post.id+'/like',{
          method:'POST',
          headers:{'Content-Type':'application/json','CSRF-Token':window.init.csrfNonce},
        });
        var j=await r.json();
        if(j.success){post.liked=j.data.liked;post.like_count=j.data.like_count;}
        else{post.liked=was;post.like_count+=(was?1:-1);}
      }catch(e){post.liked=was;post.like_count+=(was?1:-1);}
    },

    sharePost(post){
      var url=location.origin+'/feed/post/'+post.id;
      if(navigator.clipboard)navigator.clipboard.writeText(url);
      this.showToast('Link copied!');
    },

    showToast(msg){
      this.toastMsg=msg;this.toastVisible=true;
      setTimeout(function(){this.toastVisible=false;}.bind(this),1800);
    },

    openLightbox(images,idx){this.lb={open:true,images:images,idx:idx};},
    postImages(post){
      if(post.images&&post.images.length)return post.images;
      if(post.image_url)return[post.image_url];
      return[];
    },
    renderMd(text){
      if(!text)return'';
      try{return DOMPurify.sanitize(marked.parse(text));}
      catch(e){return DOMPurify.sanitize(text);}
    },
    timeAgo(iso){
      if(!iso)return'';
      var d=(Date.now()-new Date(iso).getTime())/1000;
      if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m';
      if(d<86400)return Math.floor(d/3600)+'h';
      if(d<2592000)return Math.floor(d/86400)+'d';
      return Math.floor(d/2592000)+'mo';
    },
  };
}
</script>
{% endblock %}
