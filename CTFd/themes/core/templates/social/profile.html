{% extends "base.html" %}

{% block stylesheets %}
{{ super() }}
<style>
[x-cloak] { display: none !important; }

:root, [data-bs-theme="light"] {
  --sf-bg: #f3f4f6; --sf-surface: #ffffff; --sf-elevated: #f8f9fa;
  --sf-input: #ffffff; --sf-text: #111827; --sf-muted: #6b7280;
  --sf-border: #d1d5db; --sf-accent: #6366f1; --sf-accent-rgb: 99,102,241;
  --sf-green: #22c55e; --sf-red: #ef4444;
  --sf-radius: .55rem; --sf-radius-lg: .85rem;
}
[data-bs-theme="dark"] {
  --sf-bg: #0d1117; --sf-surface: #161b22; --sf-elevated: #1c2333;
  --sf-input: #0d1117; --sf-text: #e6edf3; --sf-muted: #8b949e;
  --sf-border: #30363d; --sf-accent: #818cf8; --sf-accent-rgb: 129,140,248;
  --sf-green: #4ade80; --sf-red: #f87171;
}

body { background: var(--sf-bg); }
.sf-layout { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

.sf-back {
  display: inline-flex; align-items: center; gap: .4rem;
  color: var(--sf-muted); font-size: .82rem; text-decoration: none;
  margin-bottom: 1rem; transition: color .12s;
}
.sf-back:hover { color: var(--sf-accent); }

/* ── Profile header ────────────────────────────────── */
.sf-profile-card {
  background: var(--sf-surface); border: 1px solid var(--sf-border);
  border-radius: var(--sf-radius-lg); padding: 1.5rem;
  margin-bottom: 1.2rem; text-align: center;
}
.sf-profile-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(var(--sf-accent-rgb),.1); border: 3px solid rgba(var(--sf-accent-rgb),.2);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto .8rem; overflow: hidden; color: var(--sf-accent); font-size: 1.6rem;
}
.sf-profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.sf-profile-name { font-size: 1.2rem; font-weight: 800; color: var(--sf-text); margin-bottom: .15rem; }
.sf-profile-handle { font-size: .78rem; color: var(--sf-muted); margin-bottom: .8rem; }

/* Stats row */
.sf-stats {
  display: flex; justify-content: center; gap: 1.5rem;
  padding: .8rem 0; border-top: 1px solid var(--sf-border);
  border-bottom: 1px solid var(--sf-border); margin-bottom: .8rem;
}
.sf-stat { text-align: center; }
.sf-stat-val { font-size: 1.05rem; font-weight: 800; color: var(--sf-text); }
.sf-stat-label { font-size: .62rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--sf-muted); }

.sf-follow-btn {
  padding: .5rem 1.6rem; border-radius: 99px; font-size: .82rem;
  font-weight: 700; border: 2px solid var(--sf-accent);
  cursor: pointer; transition: all .15s;
}
.sf-follow-btn.follow { background: var(--sf-accent); color: #fff; }
.sf-follow-btn.follow:hover { opacity: .88; }
.sf-follow-btn.unfollow { background: transparent; color: var(--sf-accent); }
.sf-follow-btn.unfollow:hover { border-color: var(--sf-red); color: var(--sf-red); }

/* ── Post card (reused from feed) ──────────────────── */
.sf-post {
  background: var(--sf-surface); border: 1px solid var(--sf-border);
  border-radius: var(--sf-radius-lg); padding: 1.1rem;
  margin-bottom: .8rem; transition: border-color .15s;
}
.sf-post:hover { border-color: rgba(var(--sf-accent-rgb),.3); }
.sf-post-header { display: flex; align-items: center; gap: .6rem; margin-bottom: .6rem; }
.sf-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(var(--sf-accent-rgb),.1); border: 1px solid rgba(var(--sf-accent-rgb),.2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden; color: var(--sf-accent); font-size: .8rem;
}
.sf-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.sf-post-author {
  font-size: .88rem; font-weight: 700; color: var(--sf-text); text-decoration: none;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sf-post-author:hover { color: var(--sf-accent); }
.sf-post-time { font-size: .72rem; color: var(--sf-muted); }
.sf-post-type-badge {
  font-size: .6rem; font-weight: 700; padding: .12rem .45rem;
  border-radius: 99px; text-transform: uppercase; letter-spacing: .8px;
}
.sf-type--text { background: rgba(var(--sf-accent-rgb),.1); color: var(--sf-accent); }
.sf-type--solve { background: rgba(34,197,94,.12); color: #16a34a; }
.sf-type--discussion { background: rgba(245,158,11,.12); color: #d97706; }
.sf-type--question { background: rgba(168,85,247,.12); color: #9333ea; }

.sf-post-content {
  font-size: .88rem; line-height: 1.65; color: var(--sf-text); word-break: break-word;
}
.sf-post-content p { margin: 0 0 .4rem; }
.sf-post-content pre {
  background: var(--sf-elevated); border: 1px solid var(--sf-border);
  border-radius: var(--sf-radius); padding: .7rem; overflow-x: auto; font-size: .78rem; margin: .5rem 0;
}
.sf-post-content code { background: var(--sf-elevated); padding: .08rem .3rem; border-radius: 3px; font-size: .82rem; }
.sf-post-content pre code { background: none; padding: 0; }
.sf-post-content a { color: var(--sf-accent); }
.sf-post-content blockquote { border-left: 3px solid var(--sf-accent); padding-left: .7rem; color: var(--sf-muted); margin: .5rem 0; }
.sf-post-content img { max-width: 100%; border-radius: var(--sf-radius); margin: .5rem 0; }

.sf-challenge-link {
  display: inline-flex; align-items: center; gap: .3rem;
  padding: .3rem .65rem; border-radius: var(--sf-radius);
  background: rgba(var(--sf-accent-rgb),.06); border: 1px solid rgba(var(--sf-accent-rgb),.15);
  color: var(--sf-accent); font-size: .78rem; text-decoration: none; margin-top: .5rem;
}
.sf-challenge-link:hover { border-color: var(--sf-accent); color: var(--sf-accent); text-decoration: none; }
.sf-post-image { margin-top: .6rem; border-radius: var(--sf-radius); max-width: 100%; max-height: 400px; object-fit: cover; }
.sf-post-tags { display: flex; gap: .25rem; flex-wrap: wrap; margin-top: .5rem; }
.sf-post-tag { font-size: .6rem; padding: .1rem .4rem; border-radius: 99px; background: rgba(var(--sf-accent-rgb),.06); color: var(--sf-accent); }

.sf-actions {
  display: flex; gap: .1rem; margin-top: .7rem; padding-top: .6rem;
  border-top: 1px solid var(--sf-border);
}
.sf-action-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: .35rem;
  padding: .45rem; border-radius: var(--sf-radius); background: transparent;
  border: none; color: var(--sf-muted); font-size: .8rem; cursor: pointer; transition: all .12s;
}
.sf-action-btn:hover { background: var(--sf-elevated); color: var(--sf-text); }
.sf-action-btn.liked { color: var(--sf-red); }

.sf-loading { text-align: center; padding: 2rem; color: var(--sf-muted); }
@keyframes sf-pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.sf-loading i { animation: sf-pulse 1.2s infinite; font-size: 1.5rem; }
.sf-empty { text-align: center; padding: 2rem; color: var(--sf-muted); }
.sf-empty i { font-size: 2rem; opacity: .3; display: block; margin-bottom: .4rem; }
.sf-load-more {
  display: block; width: 100%; padding: .6rem; border-radius: var(--sf-radius);
  background: var(--sf-surface); border: 1px solid var(--sf-border);
  color: var(--sf-accent); font-size: .85rem; font-weight: 600;
  cursor: pointer; text-align: center;
}
.sf-load-more:hover { border-color: var(--sf-accent); }

/* Rank badge */
.sf-rank-badge {
  display: inline-flex; align-items: center; gap: .3rem;
  padding: .2rem .6rem; border-radius: 99px;
  background: rgba(var(--sf-accent-rgb),.08); color: var(--sf-accent);
  font-size: .72rem; font-weight: 700; margin-top: .3rem;
}
</style>
{% endblock %}

{% block content %}
<div x-data="UserProfile()" x-init="init()" x-cloak>
  <div class="sf-layout">

    <a href="/feed" class="sf-back"><i class="fas fa-arrow-left"></i> Back to Feed</a>

    <!-- Loading -->
    <div x-show="loading" class="sf-loading">
      <i class="fas fa-circle-notch fa-spin"></i>
      <p style="margin-top:.5rem;font-size:.82rem;">Loading profile...</p>
    </div>

    <template x-if="profile">
      <div>
        <!-- Profile card -->
        <div class="sf-profile-card">
          <div class="sf-profile-avatar">
            <template x-if="profile.avatar">
              <img :src="profile.avatar" :alt="profile.name">
            </template>
            <template x-if="!profile.avatar">
              <i class="fas fa-user"></i>
            </template>
          </div>
          <div class="sf-profile-name" x-text="profile.name"></div>
          <div class="sf-profile-handle" x-text="'@' + profile.name.toLowerCase().replace(/\\s+/g, '')"></div>

          <div x-show="profile.place" class="sf-rank-badge" style="margin-bottom:.5rem;">
            <i class="fas fa-trophy"></i>
            Rank #<span x-text="profile.place"></span>
            <span style="opacity:.5;">·</span>
            <span x-text="profile.score + ' pts'"></span>
          </div>

          <div class="sf-stats">
            <div class="sf-stat">
              <div class="sf-stat-val" x-text="profile.post_count"></div>
              <div class="sf-stat-label">Posts</div>
            </div>
            <div class="sf-stat">
              <div class="sf-stat-val" x-text="profile.follower_count"></div>
              <div class="sf-stat-label">Followers</div>
            </div>
            <div class="sf-stat">
              <div class="sf-stat-val" x-text="profile.following_count"></div>
              <div class="sf-stat-label">Following</div>
            </div>
            <div class="sf-stat">
              <div class="sf-stat-val" x-text="profile.challenges_created"></div>
              <div class="sf-stat-label">Challenges</div>
            </div>
          </div>

          <!-- Follow/Unfollow button (don't show for self) -->
          <button x-show="userId && userId !== profileUserId"
                  class="sf-follow-btn" :class="profile.is_following ? 'unfollow' : 'follow'"
                  @click="toggleFollow()">
            <span x-text="profile.is_following ? 'Unfollow' : 'Follow'"></span>
          </button>
        </div>

        <!-- Activity title -->
        <div style="font-size:.82rem;font-weight:700;color:var(--sf-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:.8rem;">
          <i class="fas fa-stream" style="opacity:.5;"></i> Activity
        </div>

        <!-- Empty -->
        <div x-show="!postsLoading && posts.length === 0" class="sf-empty">
          <i class="fas fa-inbox"></i>
          <p>No posts yet.</p>
        </div>

        <!-- Posts -->
        <template x-for="post in posts" :key="post.id">
          <div class="sf-post">
            <div class="sf-post-header">
              <div class="sf-avatar">
                <template x-if="post.author && post.author.avatar">
                  <img :src="post.author.avatar" :alt="post.author.name">
                </template>
                <template x-if="!post.author || !post.author.avatar">
                  <i class="fas fa-user"></i>
                </template>
              </div>
              <div style="flex:1;min-width:0;">
                <span class="sf-post-author" style="cursor:default;" x-text="post.author.name"></span>
                <div class="sf-post-time" x-text="timeAgo(post.created_at)"></div>
              </div>
              <span class="sf-post-type-badge" :class="'sf-type--' + post.post_type" x-text="post.post_type"></span>
            </div>

            <div class="sf-post-content" x-html="renderMd(post.content)"></div>

            <a x-show="post.challenge_id" :href="'/community/challenge/' + post.challenge_id" class="sf-challenge-link">
              <i class="fas fa-puzzle-piece"></i>
              <span x-text="post.challenge_name || 'Challenge #' + post.challenge_id"></span>
            </a>

            <img x-show="post.image_url" :src="post.image_url" class="sf-post-image" alt=""
                 onerror="this.style.display='none'">

            <div x-show="post.tags && post.tags.length" class="sf-post-tags">
              <template x-for="tag in post.tags" :key="tag">
                <span class="sf-post-tag" x-text="'#' + tag"></span>
              </template>
            </div>

            <div class="sf-actions">
              <button class="sf-action-btn" :class="{'liked': post.liked}" @click="toggleLike(post)">
                <i :class="post.liked ? 'fas fa-heart' : 'far fa-heart'"></i>
                <span x-text="post.like_count || ''"></span>
              </button>
              <a :href="'/feed/post/' + post.id" class="sf-action-btn" style="text-decoration:none;">
                <i class="far fa-comment"></i>
                <span x-text="post.comment_count || ''"></span>
              </a>
              <button class="sf-action-btn" @click="sharePost(post)">
                <i class="fas fa-share"></i>
              </button>
            </div>
          </div>
        </template>

        <!-- Load More -->
        <button x-show="hasMore && !postsLoading" class="sf-load-more" @click="loadMore()">
          Load more posts
        </button>
        <div x-show="postsLoading && posts.length > 0" class="sf-loading" style="padding:1rem;">
          <i class="fas fa-circle-notch fa-spin"></i>
        </div>
      </div>
    </template>

  </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script>
function UserProfile() {
  const profileUserId = {{ profile_user_id }};
  return {
    profileUserId,
    profile: null,
    posts: [],
    loading: true,
    postsLoading: false,
    page: 1,
    hasMore: false,
    userId: init.userId || null,

    async init() {
      await Promise.all([this.fetchProfile(), this.fetchPosts()]);
      this.loading = false;
    },

    async fetchProfile() {
      try {
        const resp = await fetch('/feed/api/users/' + this.profileUserId + '/profile');
        const json = await resp.json();
        if (json.success) this.profile = json.data;
      } catch(e) { console.error(e); }
    },

    async fetchPosts() {
      this.postsLoading = true;
      try {
        const params = new URLSearchParams({
          page: this.page, per_page: 20, user_id: this.profileUserId,
        });
        const resp = await fetch('/feed/api/posts?' + params);
        const json = await resp.json();
        if (json.success) {
          if (this.page === 1) {
            this.posts = json.data;
          } else {
            this.posts = [...this.posts, ...json.data];
          }
          this.hasMore = json.meta.pagination.has_next;
        }
      } catch(e) { console.error(e); }
      this.postsLoading = false;
    },

    loadMore() { this.page++; this.fetchPosts(); },

    async toggleFollow() {
      try {
        const resp = await fetch('/feed/api/users/' + this.profileUserId + '/follow', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'CSRF-Token': init.csrfNonce },
        });
        const json = await resp.json();
        if (json.success) {
          this.profile.is_following = json.data.following;
          this.profile.follower_count += json.data.following ? 1 : -1;
        }
      } catch(e) {}
    },

    async toggleLike(post) {
      try {
        const resp = await fetch('/feed/api/posts/' + post.id + '/like', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'CSRF-Token': init.csrfNonce },
        });
        const json = await resp.json();
        if (json.success) {
          post.liked = json.data.liked;
          post.like_count = json.data.like_count;
        }
      } catch(e) {}
    },

    sharePost(post) {
      const url = window.location.origin + '/feed/post/' + post.id;
      if (navigator.clipboard) { navigator.clipboard.writeText(url); alert('Link copied!'); }
    },

    renderMd(text) {
      if (!text) return '';
      try { return DOMPurify.sanitize(marked.parse(text)); }
      catch(e) { return DOMPurify.sanitize(text); }
    },

    timeAgo(iso) {
      if (!iso) return '';
      const diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 2592000) return Math.floor(diff / 86400) + 'd ago';
      return Math.floor(diff / 2592000) + 'mo ago';
    },
  };
}
</script>
{% endblock %}
